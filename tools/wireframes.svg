<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1950" viewBox="0 0 800 1950" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="800" height="1950" fill="#f6f5f3"/>

  <text x="20" y="40" font-size="25" font-weight="700" fill="#141414">Lisa Wood Studio — site wireframes</text>
  <text x="20" y="65" font-size="13" fill="#6b6b70">How it works end to end. Grey = a bento box. Apple-minimal: plain, impactful, beautiful.</text>

  <!-- ============ SCREEN 1 : HOME resting ============ -->
  <text x="20" y="112" font-size="14" font-weight="700" fill="#5b3a53">PAGE 1 · HOME — resting state</text>
  <rect x="20" y="126" width="760" height="310" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <text x="44" y="160" font-size="10" letter-spacing="1.6" font-weight="700" fill="#9a9a9f">LISA WOOD STUDIO</text>
  <text x="310" y="286" font-size="13" fill="#bcbcbc" text-anchor="middle">empty white page — the 6 categories float at the right edge</text>
  <g font-size="11.5" font-weight="700" fill="#141414" text-anchor="middle">
    <rect x="628" y="153" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="176">Visual</text>
    <rect x="628" y="197" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="220">Writing</text>
    <rect x="628" y="241" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="264">Conceptual</text>
    <rect x="628" y="285" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="308">Installation</text>
    <rect x="628" y="329" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="352">Applications</text>
    <rect x="628" y="373" width="128" height="36" rx="8" fill="#eceae7" stroke="#d8d8d6"/><text x="692" y="396">Commissions</text>
  </g>

  <!-- ============ SCREEN 2 : HOME category opened ============ -->
  <text x="20" y="472" font-size="14" font-weight="700" fill="#5b3a53">PAGE 1 · HOME — category opened  (identical for all 6 categories)</text>
  <rect x="20" y="486" width="760" height="320" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <text x="44" y="520" font-size="10" letter-spacing="1.6" font-weight="700" fill="#9a9a9f">LISA WOOD STUDIO</text>
  <!-- centred even grid of project boxes -->
  <g font-size="11" font-weight="700" fill="#141414" text-anchor="middle">
    <rect x="105" y="556" width="150" height="104" rx="9" fill="#e0ddd9" stroke="#d8d8d6"/>
    <text x="180" y="606">Surface Surveys</text><text x="180" y="623" font-size="8.5" font-weight="400" fill="#6b6b70">opens 6 more</text>
    <rect x="273" y="556" width="150" height="104" rx="9" fill="#eceae7" stroke="#d8d8d6"/><text x="348" y="612">Winterblue</text>
    <rect x="441" y="556" width="150" height="104" rx="9" fill="#eceae7" stroke="#d8d8d6"/><text x="516" y="612">Totems &amp; Sentinels</text>
    <rect x="189" y="678" width="150" height="104" rx="9" fill="#eceae7" stroke="#d8d8d6"/><text x="264" y="734">Flipped</text>
    <rect x="357" y="678" width="150" height="104" rx="9" fill="#eceae7" stroke="#d8d8d6"/><text x="432" y="734">Omani Landscapes</text>
  </g>
  <text x="348" y="800" font-size="10.5" fill="#6b6b70" text-anchor="middle">boxes fan out from the category · centred · evenly spaced · floating</text>
  <!-- quiet deck -->
  <g font-size="8.5" font-weight="700" text-anchor="middle">
    <rect x="670" y="559" width="92" height="24" rx="6" fill="#141414"/><text x="716" y="575" fill="#ffffff">Visual</text>
    <rect x="670" y="589" width="92" height="24" rx="6" fill="#eceae7" stroke="#d8d8d6"/><text x="716" y="605" fill="#141414">Writing</text>
    <rect x="670" y="619" width="92" height="24" rx="6" fill="#eceae7" stroke="#d8d8d6"/><text x="716" y="635" fill="#141414">Conceptual</text>
    <rect x="670" y="649" width="92" height="24" rx="6" fill="#eceae7" stroke="#d8d8d6"/><text x="716" y="665" fill="#141414">Installation</text>
    <rect x="670" y="679" width="92" height="24" rx="6" fill="#eceae7" stroke="#d8d8d6"/><text x="716" y="695" fill="#141414">Applications</text>
    <rect x="670" y="709" width="92" height="24" rx="6" fill="#eceae7" stroke="#d8d8d6"/><text x="716" y="725" fill="#141414">Commissions</text>
  </g>

  <!-- ============ SCREEN 3 : PROJECT page ============ -->
  <text x="20" y="842" font-size="14" font-weight="700" fill="#5b3a53">PAGE 2 · PROJECT page — styled like the Observatory (Craters / Winterblue)</text>
  <rect x="20" y="856" width="760" height="320" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <!-- left text column -->
  <text x="44" y="896" font-size="9" letter-spacing="1.4" font-weight="700" fill="#9a9a9f">PROJECT TITLE</text>
  <rect x="44" y="906" width="150" height="15" rx="3" fill="#141414"/>
  <rect x="44" y="940" width="214" height="7" rx="3" fill="#eceae7"/>
  <rect x="44" y="954" width="214" height="7" rx="3" fill="#eceae7"/>
  <rect x="44" y="968" width="186" height="7" rx="3" fill="#eceae7"/>
  <g font-size="9" font-weight="700">
    <line x1="44" y1="1014" x2="270" y2="1014" stroke="#e4e4e2"/>
    <text x="44" y="1032" fill="#6b6b70">Place</text><text x="270" y="1032" fill="#141414" text-anchor="end">Idaho, USA</text>
    <line x1="44" y1="1048" x2="270" y2="1048" stroke="#e4e4e2"/>
    <text x="44" y="1066" fill="#6b6b70">Year</text><text x="270" y="1066" fill="#141414" text-anchor="end">2026</text>
    <line x1="44" y1="1082" x2="270" y2="1082" stroke="#e4e4e2"/>
    <text x="44" y="1100" fill="#6b6b70">Medium</text><text x="270" y="1100" fill="#141414" text-anchor="end">Photography</text>
    <line x1="44" y1="1116" x2="270" y2="1116" stroke="#e4e4e2"/>
  </g>
  <!-- large image -->
  <rect x="300" y="906" width="456" height="248" rx="10" fill="#e0ddd9" stroke="#d8d8d6"/>
  <text x="528" y="1034" font-size="11" letter-spacing="1.4" font-weight="700" fill="#8a8a8f" text-anchor="middle">PROJECT IMAGE</text>
  <text x="44" y="1158" font-size="10" fill="#6b6b70">Observatory styling — white · #111 ink · light greys · minimal text · system + Georgia serif accents</text>

  <!-- ============ SCREEN 4 : COMMISSION page ============ -->
  <text x="20" y="1212" font-size="14" font-weight="700" fill="#5b3a53">PAGE 3 · COMMISSION page — behaves like a Project page (e.g. The Observatory)</text>
  <rect x="20" y="1226" width="760" height="310" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <rect x="40" y="1246" width="720" height="104" rx="8" fill="#e0ddd9" stroke="#d8d8d6"/>
  <text x="400" y="1302" font-size="10" letter-spacing="1.4" font-weight="700" fill="#8a8a8f" text-anchor="middle">FULL-BLEED HERO</text>
  <rect x="40" y="1364" width="720" height="62" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1399" font-size="10" font-weight="700" fill="#6b6b70" text-anchor="middle">IMAGE + TEXT SECTION</text>
  <rect x="40" y="1440" width="720" height="62" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1475" font-size="10" font-weight="700" fill="#6b6b70" text-anchor="middle">IMAGE + TEXT SECTION</text>
  <rect x="40" y="1512" width="720" height="18" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1524" font-size="8.5" font-weight="700" fill="#9a9a9f" text-anchor="middle">FOOTER</text>

  <!-- ============ SCREEN 5 : IMAGE GRID + MEDIA ============ -->
  <text x="20" y="1572" font-size="14" font-weight="700" fill="#5b3a53">PAGE 4 · IMAGE GRID &amp; MEDIA — inside a project (photographs + video)</text>
  <rect x="20" y="1586" width="760" height="340" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <g>
    <rect x="44" y="1620" width="228" height="128" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <rect x="286" y="1620" width="228" height="128" rx="8" fill="#e0ddd9" stroke="#d8d8d6"/>
    <circle cx="400" cy="1684" r="20" fill="#ffffff" stroke="#d8d8d6"/>
    <path d="M394 1674 L412 1684 L394 1694 Z" fill="#141414"/>
    <text x="400" y="1730" font-size="8" font-weight="700" fill="#6b6b70" text-anchor="middle">VIDEO</text>
    <rect x="528" y="1620" width="228" height="128" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <rect x="44" y="1762" width="228" height="128" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <rect x="286" y="1762" width="228" height="128" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <rect x="528" y="1762" width="228" height="128" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  </g>
  <text x="400" y="1912" font-size="10" fill="#6b6b70" text-anchor="middle">image grids pop out within a project · media includes video</text>
</svg>

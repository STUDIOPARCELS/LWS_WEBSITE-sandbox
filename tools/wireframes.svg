<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1760" viewBox="0 0 800 1760" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="800" height="1760" fill="#f6f5f3"/>

  <text x="20" y="42" font-size="25" font-weight="700" fill="#141414">Lisa Wood Studio — the 3 page types</text>
  <text x="20" y="68" font-size="13" fill="#6b6b70">Wireframes. A grey rectangle = a bento box. Structure only — not final styling.</text>

  <!-- ================= SCREEN 1 : HOME index ================= -->
  <text x="20" y="108" font-size="14" font-weight="700" fill="#5b3a53">PAGE 1 · HOME — resting state</text>
  <rect x="20" y="120" width="760" height="360" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <text x="44" y="156" font-size="10" letter-spacing="1.6" font-weight="700" fill="#9a9a9f">LISA WOOD STUDIO</text>
  <text x="300" y="310" font-size="13" fill="#bcbcbc" text-anchor="middle">empty white page</text>
  <!-- deck of 6 -->
  <g>
    <rect x="624" y="150" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="175" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Visual</text>
    <rect x="624" y="200" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="225" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Writing</text>
    <rect x="624" y="250" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="275" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Conceptual</text>
    <rect x="624" y="300" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="325" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Installation</text>
    <rect x="624" y="350" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="375" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Applications</text>
    <rect x="624" y="400" width="132" height="40" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="425" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Commissions</text>
  </g>

  <!-- ================= SCREEN 2 : HOME category opened ================= -->
  <text x="20" y="540" font-size="14" font-weight="700" fill="#5b3a53">PAGE 1 · HOME — a category opened (click Visual)</text>
  <rect x="20" y="552" width="760" height="360" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <text x="44" y="588" font-size="10" letter-spacing="1.6" font-weight="700" fill="#9a9a9f">LISA WOOD STUDIO</text>
  <!-- even grid 3 across -->
  <g>
    <rect x="44" y="610" width="176" height="124" rx="9" fill="#e0ddd9" stroke="#d8d8d6"/>
    <text x="132" y="666" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Surface Surveys</text>
    <text x="132" y="684" font-size="9" fill="#6b6b70" text-anchor="middle">opens 6 more boxes</text>
    <rect x="236" y="610" width="176" height="124" rx="9" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="324" y="676" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Winterblue</text>
    <rect x="428" y="610" width="176" height="124" rx="9" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="516" y="676" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Totems &amp; Sentinels</text>
    <rect x="44" y="748" width="176" height="124" rx="9" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="132" y="814" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Flipped</text>
    <rect x="236" y="748" width="176" height="124" rx="9" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="324" y="814" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Omani Landscapes</text>
  </g>
  <text x="324" y="894" font-size="11" fill="#6b6b70" text-anchor="middle">evenly spaced, equal boxes — 3 per row</text>
  <!-- deck, Visual active -->
  <g>
    <rect x="624" y="592" width="132" height="38" rx="8" fill="#141414"/>
    <text x="690" y="616" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Visual</text>
    <rect x="624" y="638" width="132" height="38" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="662" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Writing</text>
    <rect x="624" y="684" width="132" height="38" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="708" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Conceptual</text>
    <rect x="624" y="730" width="132" height="38" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="754" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Installation</text>
    <rect x="624" y="776" width="132" height="38" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="800" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Applications</text>
    <rect x="624" y="822" width="132" height="38" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
    <text x="690" y="846" font-size="12" font-weight="700" fill="#141414" text-anchor="middle">Commissions</text>
  </g>

  <!-- ================= SCREEN 3 : PROJECT view ================= -->
  <text x="20" y="972" font-size="14" font-weight="700" fill="#5b3a53">PAGE 2 · PROJECT — a box opens (click a project)</text>
  <rect x="20" y="984" width="760" height="360" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <rect x="44" y="1008" width="712" height="170" rx="10" fill="#e0ddd9" stroke="#d8d8d6"/>
  <text x="400" y="1098" font-size="11" letter-spacing="1.4" font-weight="700" fill="#8a8a8f" text-anchor="middle">PROJECT IMAGE</text>
  <rect x="676" y="1020" width="68" height="24" rx="12" fill="#ffffff" stroke="#d8d8d6"/>
  <text x="710" y="1036" font-size="9" font-weight="700" fill="#6b6b70" text-anchor="middle">CLOSE</text>
  <rect x="44" y="1198" width="280" height="20" rx="4" fill="#141414"/>
  <rect x="44" y="1230" width="600" height="9" rx="4" fill="#eceae7"/>
  <rect x="44" y="1246" width="520" height="9" rx="4" fill="#eceae7"/>
  <rect x="44" y="1278" width="224" height="50" rx="7" fill="#eceae7" stroke="#d8d8d6"/>
  <rect x="288" y="1278" width="224" height="50" rx="7" fill="#eceae7" stroke="#d8d8d6"/>
  <rect x="532" y="1278" width="224" height="50" rx="7" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1308" font-size="10" fill="#9a9a9f" text-anchor="middle">image gallery</text>

  <!-- ================= SCREEN 4 : COMMISSION page ================= -->
  <text x="20" y="1404" font-size="14" font-weight="700" fill="#5b3a53">PAGE 3 · COMMISSION — standalone page (e.g. The Observatory)</text>
  <rect x="20" y="1416" width="760" height="320" rx="14" fill="#ffffff" stroke="#d8d8d6"/>
  <rect x="40" y="1436" width="720" height="120" rx="8" fill="#e0ddd9" stroke="#d8d8d6"/>
  <text x="400" y="1500" font-size="10" letter-spacing="1.4" font-weight="700" fill="#8a8a8f" text-anchor="middle">FULL-BLEED HERO</text>
  <rect x="40" y="1564" width="720" height="54" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1595" font-size="10" font-weight="700" fill="#6b6b70" text-anchor="middle">INTRO / STATEMENT</text>
  <rect x="40" y="1626" width="720" height="62" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1661" font-size="10" font-weight="700" fill="#6b6b70" text-anchor="middle">PRESENTATION SECTIONS  (scroll)</text>
  <rect x="40" y="1696" width="720" height="24" rx="8" fill="#eceae7" stroke="#d8d8d6"/>
  <text x="400" y="1712" font-size="9" font-weight="700" fill="#9a9a9f" text-anchor="middle">FOOTER</text>
</svg>

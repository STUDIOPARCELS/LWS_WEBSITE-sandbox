<!DOCTYPE html>
<!-- GENERATED FILE — do not edit index.html directly.
     Edit content in content/site.json, then run: npm run build -->
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
{{META}}
{{JSONLD}}
<style>
:root {
  --paper: #ffffff;
  --ink: #111111;
  --muted: #6e6e73;
  --soft: #bdbdbd;
  --line: #e4e4e4;
  --tint: #f4f3f1;
  --max: 1280px;
  --ease: cubic-bezier(.22,.61,.36,1);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { display: block; width: 100%; height: auto; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
figure, p, h2 { margin: 0; }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 clamp(24px, 6vw, 96px); }

/* ---------- brand + corner links ---------- */
.brand {
  position: fixed;
  top: 34px;
  left: clamp(20px, 5vw, 48px);
  z-index: 40;
  font-size: 12px;
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 600;
}
.corner-links {
  position: fixed;
  bottom: 32px;
  left: clamp(20px, 5vw, 48px);
  z-index: 40;
  display: flex;
  gap: 22px;
}
.corner-links a {
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
  transition: color .2s ease;
}
.corner-links a:hover { color: var(--ink); }

/* ---------- right-side category nav ---------- */
.cat-nav {
  position: fixed;
  top: 50%;
  right: clamp(20px, 5vw, 56px);
  transform: translateY(-50%);
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: clamp(4px, 1.2vh, 14px);
}
.cat-row {
  display: block;
  text-align: right;
  padding: 6px 0;
}
.cat-row .cat-name {
  display: block;
  font-size: clamp(24px, 3.2vw, 44px);
  font-weight: 600;
  letter-spacing: -.02em;
  line-height: 1.04;
  color: var(--soft);
  transition: color .28s var(--ease);
}
.cat-row .cat-count {
  display: block;
  margin-top: 3px;
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  color: transparent;
  transition: color .28s var(--ease);
}
.cat-row:hover .cat-name,
.cat-row.is-active .cat-name { color: var(--ink); }
.cat-row:hover .cat-count,
.cat-row.is-active .cat-count { color: var(--muted); }

/* ---------- stage + bento ---------- */
.stage { min-height: 100vh; }
.bento-wrap {
  padding: clamp(96px, 15vh, 168px) clamp(220px, 26vw, 440px) clamp(80px, 12vh, 120px) clamp(20px, 6vw, 96px);
}
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(12px, 1.4vw, 20px);
  grid-auto-rows: clamp(132px, 19vh, 196px);
}
.bento[hidden] { display: none; }
.card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: var(--tint);
  text-align: left;
  display: block;
  will-change: transform;
}
.card.size-lg   { grid-column: span 2; grid-row: span 2; }
.card.size-wide { grid-column: span 2; grid-row: span 1; }
.card.size-tall { grid-column: span 1; grid-row: span 2; }
.card.size-md   { grid-column: span 1; grid-row: span 1; }

.card-visual { position: absolute; inset: 0; }
.card-visual img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .8s var(--ease);
}
.card:hover .card-visual img { transform: scale(1.05); }
.card-visual.is-wip {
  background: linear-gradient(150deg, #f6f5f3 0%, #ebe9e5 100%);
}
.card-shade {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.46) 0%, rgba(0,0,0,0) 52%);
  opacity: .9;
}
.card-visual.is-wip + .card-shade { background: none; }
.card-meta {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: clamp(14px, 1.6vw, 22px);
  z-index: 2;
}
.card-meta .c-eyebrow {
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-weight: 600;
}
.card-meta .c-title {
  margin-top: 6px;
  font-size: clamp(16px, 1.7vw, 22px);
  font-weight: 600;
  letter-spacing: -.01em;
  line-height: 1.12;
}
.card.on-image .c-eyebrow { color: rgba(255,255,255,.78); }
.card.on-image .c-title { color: #fff; }
.card.on-tint .c-eyebrow { color: var(--muted); }
.card.on-tint .c-title { color: var(--ink); }
.card .c-wip {
  position: absolute; top: clamp(14px,1.6vw,22px); left: clamp(14px,1.6vw,22px);
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  font-weight: 600; color: var(--soft);
}

.bento-empty {
  grid-column: 1 / -1;
  border: 1px dashed var(--line);
  border-radius: 14px;
  padding: clamp(48px, 9vh, 110px) 32px;
  text-align: center;
}
.bento-empty p { font-size: clamp(16px,2vw,22px); font-weight: 500; }
.bento-empty .eyebrow {
  margin-bottom: 14px;
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
}

/* ---------- project overlay ---------- */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--paper);
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
}
.overlay.is-open { visibility: visible; }
.overlay-close {
  position: fixed;
  top: 24px; right: clamp(24px, 6vw, 64px);
  z-index: 52;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 11px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--line);
}
.overlay-hero {
  position: relative;
  width: 100%;
  height: min(74vh, 760px);
  background: var(--tint);
  overflow: hidden;
}
.overlay-hero .card-visual { position: absolute; inset: 0; }
.overlay-hero .card-visual img { width: 100%; height: 100%; object-fit: cover; }
.overlay-body { padding: clamp(36px, 6vh, 80px) 0 clamp(56px, 9vh, 120px); }
.overlay-body .o-eyebrow {
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
}
.overlay-body h2 {
  font-size: clamp(32px, 5.4vw, 68px);
  line-height: 1.02;
  letter-spacing: -.02em;
  font-weight: 600;
  margin: 16px 0 0;
}
.overlay-body .o-meta {
  margin-top: 16px;
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}
.overlay-body .o-desc {
  margin-top: 26px;
  max-width: 620px;
  font-size: clamp(16px, 1.7vw, 19px);
  line-height: 1.62;
  color: var(--ink);
}
.overlay-gallery {
  margin-top: clamp(36px, 6vh, 72px);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(12px, 1.6vw, 22px);
}
.overlay-gallery figure { border-radius: 12px; overflow: hidden; background: var(--tint); }
.overlay-gallery img { aspect-ratio: 3 / 2; object-fit: cover; }
.overlay-gallery figure:first-child { grid-column: span 2; }
.overlay-gallery figure:first-child img { aspect-ratio: 16 / 9; }
.overlay-note {
  margin-top: clamp(32px, 5vh, 64px);
  padding: clamp(36px, 6vh, 72px) 32px;
  border: 1px dashed var(--line);
  border-radius: 14px;
  text-align: center;
  color: var(--muted);
  font-size: 15px;
  letter-spacing: .04em;
}

@media (max-width: 1100px) {
  .bento-wrap { padding-right: clamp(180px, 24vw, 300px); }
}
@media (max-width: 760px) {
  .cat-nav {
    top: auto; bottom: 0; left: 0; right: 0;
    transform: none;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,.93);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--line);
  }
  .cat-row { padding: 2px 0; }
  .cat-row .cat-name { font-size: 17px; }
  .cat-row .cat-count { display: none; }
  .corner-links { bottom: auto; top: 34px; left: auto; right: clamp(20px, 5vw, 48px); }
  .bento-wrap { padding: 96px 20px 150px; }
  .bento { grid-template-columns: repeat(2, 1fr); }
  .card.size-lg { grid-column: span 2; grid-row: span 2; }
  .card.size-wide { grid-column: span 2; }
  .card.size-tall { grid-column: span 1; grid-row: span 2; }
}
@media (max-width: 520px) {
  .bento { grid-template-columns: 1fr; grid-auto-rows: clamp(170px, 42vw, 230px); }
  .card.size-lg, .card.size-wide, .card.size-tall, .card.size-md {
    grid-column: span 1; grid-row: span 1;
  }
  .overlay-gallery { grid-template-columns: 1fr; }
  .overlay-gallery figure:first-child { grid-column: span 1; }
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<a class="brand" href="#" id="brandHome">{{BRAND}}</a>

<nav class="corner-links" aria-label="Pages">
{{CORNER_LINKS}}
</nav>

<main class="stage" id="stage">
  <div class="bento-wrap">
    <div class="bento" id="bento" hidden></div>
  </div>
</main>

<nav class="cat-nav" id="catNav" aria-label="Work categories">
{{CAT_NAV}}
</nav>

<div class="overlay" id="overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Project detail">
  <button type="button" class="overlay-close" id="overlayClose">Close</button>
  <div class="overlay-hero" id="overlayHero"></div>
  <div class="overlay-body">
    <div class="wrap">
      <p class="o-eyebrow" id="overlayEyebrow"></p>
      <h2 id="overlayTitle"></h2>
      <p class="o-meta" id="overlayMeta"></p>
      <p class="o-desc" id="overlayDesc"></p>
      <div class="overlay-gallery" id="overlayGallery"></div>
      <div class="overlay-note" id="overlayNote" hidden></div>
    </div>
  </div>
</div>

<script type="application/json" id="site-data">{{SITE_DATA}}</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
<script>
/* ------------------------------------------------------------------
   CONTENT lives in content/site.json — the single source of truth.
   To add or edit work, edit that file and run:  npm run build
   This script only renders and animates; it never holds content.
------------------------------------------------------------------- */
const SITE = JSON.parse(document.getElementById("site-data").textContent);
const CATEGORIES = SITE.categories;

const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const HAS_GSAP = !!window.gsap;
const img = (path, size) => SITE.media.basePath + "/" + size + "/" + path;
const findCategory = key => CATEGORIES.find(c => c.key === key);
const findProject = (catKey, id) =>
  findCategory(catKey).projects.find(p => p.id === id);

let state = "index";       // "index" (blank) or a category key
let floatTweens = [];
let activeCard = null;     // card whose visual is lifted into the overlay

const catNav  = document.getElementById("catNav");
const bento   = document.getElementById("bento");
const overlay = document.getElementById("overlay");

function projectCount(cat) {
  const total = cat.projects.length;
  if (total === 0) return "In preparation";
  const ready = cat.projects.filter(p => p.status === "ready").length;
  return ready + " / " + total;
}

/* ---------- right-side category nav ---------- */
function renderCatNav() {
  catNav.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const row = document.createElement("button");
    row.type = "button";
    row.className = "cat-row";
    row.dataset.cat = cat.key;
    row.innerHTML =
      '<span class="cat-name">' + cat.label + '</span>' +
      '<span class="cat-count">' + projectCount(cat) + '</span>';
    row.addEventListener("click", () => toggleCategory(cat.key));
    catNav.appendChild(row);
  });
}
function setActiveNav(key) {
  catNav.querySelectorAll(".cat-row").forEach(r => {
    r.classList.toggle("is-active", r.dataset.cat === key);
  });
}

/* ---------- bento grid ---------- */
function renderBento(catKey) {
  const cat = findCategory(catKey);
  bento.innerHTML = "";
  bento.hidden = false;

  if (cat.projects.length === 0) {
    const empty = document.createElement("div");
    empty.className = "bento-empty";
    empty.innerHTML =
      '<p class="eyebrow">' + cat.label + '</p>' +
      '<p>This collection is in preparation.</p>';
    bento.appendChild(empty);
    return;
  }

  cat.projects.forEach(p => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card size-" + (p.size || "md");
    card.dataset.id = p.id;
    card.classList.add(p.status === "ready" ? "on-image" : "on-tint");

    let visual;
    if (p.status === "ready") {
      visual =
        '<div class="card-visual">' +
          '<img src="' + img(p.cover, "1200") + '" ' +
            'srcset="' + img(p.cover, "1200") + ' 1200w, ' + img(p.cover, "2000") + ' 2000w" ' +
            'sizes="(max-width: 760px) 100vw, 40vw" ' +
            'alt="' + p.title + '" loading="lazy" decoding="async">' +
        '</div><div class="card-shade"></div>';
    } else {
      visual =
        '<div class="card-visual is-wip"></div><div class="card-shade"></div>' +
        '<span class="c-wip">In preparation</span>';
    }
    card.innerHTML = visual +
      '<div class="card-meta">' +
        '<p class="c-eyebrow">' + p.eyebrow + '</p>' +
        '<p class="c-title">' + p.title + '</p>' +
      '</div>';
    card.addEventListener("click", () => openProject(catKey, p.id, card));
    bento.appendChild(card);
  });
}

/* ---------- idle float on bento cards ---------- */
function startFloat() {
  stopFloat();
  if (REDUCED || !HAS_GSAP) return;
  document.querySelectorAll(".bento .card").forEach(card => {
    const amp = gsap.utils.random(5, 11);
    floatTweens.push(
      gsap.to(card, {
        y: "+=" + amp,
        duration: gsap.utils.random(3.4, 5.6),
        ease: "sine.inOut",
        repeat: -1,
        yoyo: true,
        delay: gsap.utils.random(0, 1.4)
      })
    );
  });
}
function stopFloat() {
  floatTweens.forEach(t => t.kill());
  floatTweens = [];
  if (HAS_GSAP) gsap.set(".bento .card", { y: 0 });
}

/* ---------- pop the boxes out ---------- */
function animateBentoIn() {
  const cards = bento.querySelectorAll(".card");
  const items = cards.length ? cards : bento.querySelectorAll(".bento-empty");
  if (REDUCED || !HAS_GSAP) {
    if (HAS_GSAP) gsap.set(items, { opacity: 1, scale: 1, y: 0 });
    startFloat();
    return;
  }
  gsap.fromTo(items,
    { opacity: 0, scale: .55, y: 24 },
    {
      opacity: 1, scale: 1, y: 0,
      duration: .6, ease: "back.out(1.6)", stagger: 0.05,
      onComplete: startFloat
    }
  );
}

/* ---------- open / switch / close categories ---------- */
function toggleCategory(key) {
  if (state === key) { goBlank(); return; }
  const switching = state !== "index" && bento.children.length > 0;
  if (switching && !REDUCED && HAS_GSAP) {
    stopFloat();
    gsap.to(bento.children, {
      opacity: 0, scale: .7, duration: .2, stagger: .02, ease: "power2.in",
      onComplete: () => {
        state = key;
        setActiveNav(key);
        renderBento(key);
        animateBentoIn();
      }
    });
  } else {
    state = key;
    setActiveNav(key);
    renderBento(key);
    animateBentoIn();
  }
}

function goBlank() {
  state = "index";
  setActiveNav(null);
  stopFloat();
  if (!REDUCED && HAS_GSAP && bento.children.length) {
    gsap.to(bento.children, {
      opacity: 0, scale: .7, y: 20, duration: .28, stagger: .02, ease: "power2.in",
      onComplete: () => { bento.hidden = true; bento.innerHTML = ""; }
    });
  } else {
    bento.hidden = true;
    bento.innerHTML = "";
  }
}

/* ---------- project overlay (GSAP Flip expand) ---------- */
const oHero    = document.getElementById("overlayHero");
const oEyebrow = document.getElementById("overlayEyebrow");
const oTitle   = document.getElementById("overlayTitle");
const oMeta    = document.getElementById("overlayMeta");
const oDesc    = document.getElementById("overlayDesc");
const oGallery = document.getElementById("overlayGallery");
const oNote    = document.getElementById("overlayNote");

function buildOverlayContent(cat, p) {
  oEyebrow.textContent = cat.label + (p.eyebrow ? " — " + p.eyebrow : "");
  oTitle.textContent = p.title;
  oMeta.textContent = p.meta || "";
  oMeta.style.display = p.meta ? "block" : "none";

  if (p.status === "ready") {
    oDesc.textContent = p.description || "";
    oDesc.style.display = p.description ? "block" : "none";
    oNote.hidden = true;
    oGallery.hidden = false;
    oGallery.innerHTML = "";
    [p.cover].concat(p.gallery || []).forEach(src => {
      const fig = document.createElement("figure");
      fig.innerHTML =
        '<img src="' + img(src, "1200") + '" ' +
          'srcset="' + img(src, "1200") + ' 1200w, ' + img(src, "2000") + ' 2000w" ' +
          'sizes="(max-width: 900px) 100vw, 1100px" ' +
          'alt="' + p.title + '" loading="lazy" decoding="async">';
      oGallery.appendChild(fig);
    });
  } else {
    oDesc.style.display = "none";
    oGallery.hidden = true;
    oGallery.innerHTML = "";
    oNote.hidden = false;
    oNote.textContent = "This project is in preparation. Imagery and writing are being prepared for the studio archive.";
  }
}

function openProject(catKey, id, card) {
  const cat = findCategory(catKey);
  const p = findProject(catKey, id);
  buildOverlayContent(cat, p);

  const visual = card.querySelector(".card-visual");
  activeCard = card;

  card.style.height = card.offsetHeight + "px";

  overlay.classList.add("is-open");
  overlay.setAttribute("aria-hidden", "false");
  overlay.scrollTop = 0;
  document.body.style.overflow = "hidden";

  if (REDUCED || !window.Flip) {
    oHero.appendChild(visual);
    if (HAS_GSAP) gsap.set(overlay, { opacity: 1 });
    else overlay.style.opacity = 1;
    revealOverlayBody(true);
    return;
  }

  const flipState = Flip.getState(visual);
  oHero.appendChild(visual);
  gsap.set(overlay, { opacity: 1 });
  Flip.from(flipState, {
    duration: .62,
    ease: "power3.inOut",
    absolute: true,
    scale: false
  });
  revealOverlayBody(false);
}

function revealOverlayBody(instant) {
  const body = overlay.querySelectorAll(".overlay-body .wrap > *");
  if (instant || REDUCED || !HAS_GSAP) {
    if (HAS_GSAP) gsap.set(body, { opacity: 1, y: 0 });
    return;
  }
  gsap.fromTo(body,
    { opacity: 0, y: 24 },
    { opacity: 1, y: 0, duration: .5, ease: "power2.out", stagger: .06, delay: .26 }
  );
}

function closeProject() {
  if (!activeCard) return;
  const card = activeCard;
  const visual = oHero.querySelector(".card-visual");

  const finish = () => {
    card.style.height = "";
    overlay.classList.remove("is-open");
    overlay.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    if (HAS_GSAP) gsap.set(overlay, { opacity: 0 });
    else overlay.style.opacity = 0;
    activeCard = null;
  };

  if (REDUCED || !window.Flip || !visual) {
    if (visual) card.insertBefore(visual, card.firstChild);
    finish();
    return;
  }

  const flipState = Flip.getState(visual);
  card.insertBefore(visual, card.firstChild);
  Flip.from(flipState, {
    duration: .5,
    ease: "power3.inOut",
    absolute: true,
    scale: false,
    onComplete: finish
  });
  gsap.to(overlay.querySelectorAll(".overlay-body .wrap > *"), {
    opacity: 0, duration: .2
  });
}

/* ---------- wiring ---------- */
document.getElementById("overlayClose").addEventListener("click", closeProject);
document.getElementById("brandHome").addEventListener("click", e => {
  e.preventDefault();
  if (overlay.classList.contains("is-open")) closeProject();
  goBlank();
});
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (overlay.classList.contains("is-open")) closeProject();
  else if (state !== "index") goBlank();
});

renderCatNav();
if (!REDUCED && HAS_GSAP) {
  gsap.from(".cat-nav .cat-row", {
    opacity: 0, x: 26, duration: .6, ease: "power3.out", stagger: .08, delay: .15
  });
  gsap.from(".brand, .corner-links", { opacity: 0, duration: .8, delay: .1 });
}
</script>

</body>
</html>

<!DOCTYPE html>
<!-- GENERATED FILE — do not edit index.html directly.
     Edit content in content/site.json, then run: npm run build -->
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
{{META}}
{{JSONLD}}
<style>
:root {
  --paper: #ffffff;
  --ink: #111111;
  --muted: #6e6e73;
  --soft: #a6a6a6;
  --line: #e4e4e4;
  --tint: #f4f3f1;
  --nav-bg: rgba(255,255,255,.82);
  --max: 1280px;
  --label-size: 10px;
  --ease: cubic-bezier(.22,.61,.36,1);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { display: block; width: 100%; height: auto; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
figure, p, h1, h2, h3, h4 { margin: 0; }

.eyebrow {
  font-size: var(--label-size);
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
}
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 clamp(24px, 6vw, 96px); }

/* ---------- nav ---------- */
.nav {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 30px clamp(24px, 6vw, 96px);
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(22px);
  -webkit-backdrop-filter: saturate(180%) blur(22px);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.nav-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 28px;
}
.brand {
  font-size: clamp(13px, 1.1vw, 15px);
  letter-spacing: .2em;
  font-weight: 500;
  text-transform: uppercase;
}
.nav-links { display: flex; gap: clamp(16px, 3vw, 40px); color: var(--muted); }
.nav-links a, .nav-links button {
  font-size: 11px;
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 600;
  transition: color .2s ease;
}
.nav-links a:hover, .nav-links button:hover { color: var(--ink); }

/* ---------- intro ---------- */
.intro { padding: clamp(56px, 10vh, 128px) 0 clamp(20px, 4vh, 48px); }
.intro h1 {
  font-size: clamp(36px, 6.4vw, 80px);
  line-height: 1.0;
  letter-spacing: -.015em;
  font-weight: 600;
  margin: 22px 0 0;
  max-width: 16ch;
}
.intro h1 .soft { color: var(--soft); }
.intro .lede {
  max-width: 600px;
  margin-top: 26px;
  font-size: clamp(15px, 1.5vw, 18px);
  line-height: 1.6;
  color: var(--muted);
}

/* ---------- explore ---------- */
.explore { padding: clamp(28px, 5vh, 64px) 0 clamp(60px, 9vh, 120px); }

/* category list (index state) */
.cat-list { display: flex; flex-direction: column; }
.cat-row {
  display: flex;
  align-items: baseline;
  gap: 20px;
  width: 100%;
  text-align: left;
  padding: clamp(14px, 2.4vh, 26px) 0;
  border-top: 1px solid var(--line);
  transition: padding-left .4s var(--ease), color .25s ease;
}
.cat-list .cat-row:last-child { border-bottom: 1px solid var(--line); }
.cat-row:hover { padding-left: 16px; }
.cat-row .cat-name {
  font-size: clamp(34px, 7vw, 92px);
  line-height: .98;
  letter-spacing: -.02em;
  font-weight: 600;
}
.cat-row .cat-index {
  font-size: var(--label-size);
  letter-spacing: .2em;
  font-weight: 600;
  color: var(--soft);
}
.cat-row .cat-count {
  margin-left: auto;
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.cat-row:hover .cat-name { color: var(--ink); }

/* category bar (open state) */
.cat-bar {
  display: none;
  flex-wrap: wrap;
  align-items: baseline;
  gap: clamp(14px, 2.4vw, 32px);
  padding-bottom: clamp(20px, 3vh, 36px);
  border-bottom: 1px solid var(--line);
  margin-bottom: clamp(24px, 4vh, 48px);
}
.cat-bar button {
  font-size: clamp(15px, 1.7vw, 22px);
  font-weight: 600;
  letter-spacing: -.01em;
  color: var(--soft);
  transition: color .2s ease;
}
.cat-bar button:hover { color: var(--muted); }
.cat-bar button.is-active { color: var(--ink); }
.cat-bar .bar-back {
  margin-left: auto;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
}
.cat-bar .bar-back:hover { color: var(--ink); }

.is-open .cat-list { display: none; }
.is-open .cat-bar { display: flex; }

/* ---------- bento ---------- */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(12px, 1.4vw, 20px);
  grid-auto-rows: clamp(150px, 21vh, 210px);
}
.card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: var(--tint);
  text-align: left;
  display: block;
  will-change: transform;
}
.card.size-lg   { grid-column: span 2; grid-row: span 2; }
.card.size-wide { grid-column: span 2; grid-row: span 1; }
.card.size-tall { grid-column: span 1; grid-row: span 2; }
.card.size-md   { grid-column: span 1; grid-row: span 1; }

.card-visual { position: absolute; inset: 0; }
.card-visual img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .8s var(--ease);
}
.card:hover .card-visual img { transform: scale(1.05); }
.card-visual.is-wip {
  background: linear-gradient(150deg, #f6f5f3 0%, #ebe9e5 100%);
}
.card-shade {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.46) 0%, rgba(0,0,0,0) 52%);
  opacity: .9;
}
.card-visual.is-wip + .card-shade { background: none; }
.card-meta {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: clamp(14px, 1.6vw, 22px);
  z-index: 2;
}
.card-meta .c-eyebrow {
  font-size: var(--label-size);
  letter-spacing: .18em;
  text-transform: uppercase;
  font-weight: 600;
}
.card-meta .c-title {
  margin-top: 6px;
  font-size: clamp(16px, 1.7vw, 22px);
  font-weight: 600;
  letter-spacing: -.01em;
  line-height: 1.12;
}
.card.on-image .c-eyebrow { color: rgba(255,255,255,.78); }
.card.on-image .c-title { color: #fff; }
.card.on-tint .c-eyebrow { color: var(--muted); }
.card.on-tint .c-title { color: var(--ink); }
.card .c-wip {
  position: absolute; top: clamp(14px,1.6vw,22px); left: clamp(14px,1.6vw,22px);
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  font-weight: 600; color: var(--soft);
}

.bento-empty {
  border: 1px dashed var(--line);
  border-radius: 14px;
  padding: clamp(48px, 9vh, 110px) 32px;
  text-align: center;
}
.bento-empty p { font-size: clamp(16px,2vw,22px); font-weight: 500; }
.bento-empty .eyebrow { margin-bottom: 14px; }

/* ---------- practice ---------- */
.practice { padding: clamp(56px, 9vh, 120px) 0; border-top: 1px solid var(--line); }
.statement { max-width: 760px; }
.statement p {
  font-size: clamp(18px, 2.2vw, 26px);
  line-height: 1.5;
  letter-spacing: -.005em;
}
.statement p em { font-style: italic; }
.statement .detail { margin-top: 24px; font-size: 16px; line-height: 1.65; color: var(--muted); }

/* ---------- footer ---------- */
.footer { border-top: 1px solid var(--line); padding: 52px 0 68px; }
.footer-inner { display: flex; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.footer p { font-size: var(--label-size); letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }

/* ---------- overlay ---------- */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--paper);
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
}
.overlay.is-open { visibility: visible; }
.overlay-close {
  position: fixed;
  top: 24px; right: clamp(24px, 6vw, 64px);
  z-index: 52;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 11px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--line);
}
.overlay-hero {
  position: relative;
  width: 100%;
  height: min(74vh, 760px);
  background: var(--tint);
  overflow: hidden;
}
.overlay-hero .card-visual { position: absolute; inset: 0; }
.overlay-hero .card-visual img { width: 100%; height: 100%; object-fit: cover; }
.overlay-body { padding: clamp(36px, 6vh, 80px) 0 clamp(56px, 9vh, 120px); }
.overlay-body .o-eyebrow { color: var(--muted); }
.overlay-body h2 {
  font-size: clamp(32px, 5.4vw, 68px);
  line-height: 1.02;
  letter-spacing: -.02em;
  font-weight: 600;
  margin: 16px 0 0;
}
.overlay-body .o-meta {
  margin-top: 16px;
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}
.overlay-body .o-desc {
  margin-top: 26px;
  max-width: 620px;
  font-size: clamp(16px, 1.7vw, 19px);
  line-height: 1.62;
  color: var(--ink);
}
.overlay-gallery {
  margin-top: clamp(36px, 6vh, 72px);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(12px, 1.6vw, 22px);
}
.overlay-gallery figure { border-radius: 12px; overflow: hidden; background: var(--tint); }
.overlay-gallery img { aspect-ratio: 3 / 2; object-fit: cover; }
.overlay-gallery figure:first-child { grid-column: span 2; }
.overlay-gallery figure:first-child img { aspect-ratio: 16 / 9; }
.overlay-note {
  margin-top: clamp(32px, 5vh, 64px);
  padding: clamp(36px, 6vh, 72px) 32px;
  border: 1px dashed var(--line);
  border-radius: 14px;
  text-align: center;
  color: var(--muted);
  font-size: 15px;
  letter-spacing: .04em;
}

@media (max-width: 900px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .card.size-lg { grid-column: span 2; grid-row: span 2; }
  .card.size-wide { grid-column: span 2; }
  .card.size-tall { grid-column: span 1; grid-row: span 2; }
}
@media (max-width: 560px) {
  .bento { grid-template-columns: 1fr; grid-auto-rows: clamp(180px, 40vw, 240px); }
  .card.size-lg, .card.size-wide, .card.size-tall, .card.size-md {
    grid-column: span 1; grid-row: span 1;
  }
  .overlay-gallery { grid-template-columns: 1fr; }
  .overlay-gallery figure:first-child { grid-column: span 1; }
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="#top">{{BRAND}}</a>
    <nav class="nav-links" aria-label="Primary">
{{NAV_LINKS}}
    </nav>
  </div>
</header>

<main id="top">

  <section class="intro">
    <div class="wrap">
      <p class="eyebrow">{{INTRO_EYEBROW}}</p>
      <h1>{{INTRO_HEADING}}</h1>
      <p class="lede">{{INTRO_LEDE}}</p>
    </div>
  </section>

  <section class="explore" id="work">
    <div class="wrap">
      <div class="cat-list" id="catList">
{{CAT_LIST}}
      </div>
      <div class="cat-bar" id="catBar"></div>
      <div class="bento" id="bento" hidden></div>
    </div>
  </section>

  <section class="practice" id="practice">
    <div class="wrap">
      <div class="statement">
        <p>{{PRACTICE_LEAD}}</p>
        <p class="detail">{{PRACTICE_DETAIL}}</p>
      </div>
    </div>
  </section>

</main>

<footer class="footer">
  <div class="wrap footer-inner">
    <p>{{FOOTER_LEFT}}</p>
    <p>{{FOOTER_RIGHT}}</p>
  </div>
</footer>

<div class="overlay" id="overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Project detail">
  <button type="button" class="overlay-close" id="overlayClose">Close</button>
  <div class="overlay-hero" id="overlayHero"></div>
  <div class="overlay-body">
    <div class="wrap">
      <p class="eyebrow o-eyebrow" id="overlayEyebrow"></p>
      <h2 id="overlayTitle"></h2>
      <p class="o-meta" id="overlayMeta"></p>
      <p class="o-desc" id="overlayDesc"></p>
      <div class="overlay-gallery" id="overlayGallery"></div>
      <div class="overlay-note" id="overlayNote" hidden></div>
    </div>
  </div>
</div>

<script type="application/json" id="site-data">{{SITE_DATA}}</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
<script>
/* ------------------------------------------------------------------
   CONTENT lives in content/site.json — the single source of truth.
   To add or edit work, edit that file and run:  npm run build
   This script only renders and animates; it never holds content.
------------------------------------------------------------------- */
const SITE = JSON.parse(document.getElementById("site-data").textContent);
const CATEGORIES = SITE.categories;

/* ------------------------------------------------------------------ */
const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const img = (path, size) => SITE.media.basePath + "/" + size + "/" + path;
const findCategory = key => CATEGORIES.find(c => c.key === key);
const findProject = (catKey, id) =>
  findCategory(catKey).projects.find(p => p.id === id);

let state = "index";       // "index" or a category key
let floatTweens = [];
let activeCard = null;     // card whose visual is currently lifted into the overlay

const explore   = document.querySelector(".explore");
const catList   = document.getElementById("catList");
const catBar    = document.getElementById("catBar");
const bento     = document.getElementById("bento");
const overlay   = document.getElementById("overlay");

/* ---------- index view: big category list ---------- */
function renderCatList() {
  catList.innerHTML = "";
  CATEGORIES.forEach((cat, i) => {
    const ready = cat.projects.filter(p => p.status === "ready").length;
    const total = cat.projects.length;
    const count = total === 0 ? "In preparation"
      : ready + " of " + total + " open";
    const row = document.createElement("button");
    row.type = "button";
    row.className = "cat-row";
    row.dataset.cat = cat.key;
    row.innerHTML =
      '<span class="cat-index">' + String(i + 1).padStart(2, "0") + '</span>' +
      '<span class="cat-name">' + cat.label + '</span>' +
      '<span class="cat-count">' + count + '</span>';
    row.addEventListener("click", () => openCategory(cat.key));
    catList.appendChild(row);
  });
}

/* ---------- open-state: compact category bar ---------- */
function renderCatBar() {
  catBar.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = cat.label;
    b.classList.toggle("is-active", cat.key === state);
    b.addEventListener("click", () => switchCategory(cat.key));
    catBar.appendChild(b);
  });
  const back = document.createElement("button");
  back.type = "button";
  back.className = "bar-back";
  back.textContent = "All categories";
  back.addEventListener("click", goIndex);
  catBar.appendChild(back);
}

/* ---------- bento grid ---------- */
function renderBento(catKey) {
  const cat = findCategory(catKey);
  bento.innerHTML = "";
  bento.hidden = false;

  if (cat.projects.length === 0) {
    bento.classList.add("is-empty-grid");
    const empty = document.createElement("div");
    empty.className = "bento-empty";
    empty.innerHTML =
      '<p class="eyebrow">' + cat.label + '</p>' +
      '<p>This collection is in preparation.</p>';
    bento.appendChild(empty);
    bento.style.display = "block";
    return;
  }
  bento.style.display = "grid";

  cat.projects.forEach(p => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card size-" + (p.size || "md");
    card.dataset.id = p.id;
    card.classList.add(p.status === "ready" ? "on-image" : "on-tint");

    let visual;
    if (p.status === "ready") {
      visual =
        '<div class="card-visual">' +
          '<img src="' + img(p.cover, "1200") + '" ' +
            'srcset="' + img(p.cover, "1200") + ' 1200w, ' + img(p.cover, "2000") + ' 2000w" ' +
            'sizes="(max-width: 900px) 100vw, 50vw" ' +
            'alt="' + p.title + '" loading="lazy" decoding="async">' +
        '</div><div class="card-shade"></div>';
    } else {
      visual =
        '<div class="card-visual is-wip"></div><div class="card-shade"></div>' +
        '<span class="c-wip">In preparation</span>';
    }
    card.innerHTML = visual +
      '<div class="card-meta">' +
        '<p class="c-eyebrow">' + p.eyebrow + '</p>' +
        '<p class="c-title">' + p.title + '</p>' +
      '</div>';
    card.addEventListener("click", () => openProject(catKey, p.id, card));
    bento.appendChild(card);
  });
}

/* ---------- floating motion on bento cards ---------- */
function startFloat() {
  stopFloat();
  if (REDUCED) return;
  document.querySelectorAll(".bento .card").forEach(card => {
    const amp = gsap.utils.random(5, 11);
    floatTweens.push(
      gsap.to(card, {
        y: "+=" + amp,
        duration: gsap.utils.random(3.4, 5.6),
        ease: "sine.inOut",
        repeat: -1,
        yoyo: true,
        delay: gsap.utils.random(0, 1.4)
      })
    );
  });
}
function stopFloat() {
  floatTweens.forEach(t => t.kill());
  floatTweens = [];
  gsap.set(".bento .card", { y: 0 });
}

/* ---------- category transitions ---------- */
function openCategory(catKey) {
  state = catKey;
  explore.classList.add("is-open");
  renderCatBar();
  renderBento(catKey);
  animateBentoIn();
}

function switchCategory(catKey) {
  if (catKey === state) return;
  const cards = bento.children;
  if (REDUCED) {
    state = catKey;
    renderCatBar(); renderBento(catKey); startFloat();
    return;
  }
  stopFloat();
  gsap.to(cards, {
    opacity: 0, y: 24, scale: .96, duration: .28, stagger: .03,
    ease: "power2.in",
    onComplete: () => {
      state = catKey;
      renderCatBar();
      renderBento(catKey);
      animateBentoIn();
    }
  });
}

function animateBentoIn() {
  const cards = bento.querySelectorAll(".card");
  const items = cards.length ? cards : bento.querySelectorAll(".bento-empty");
  if (REDUCED) { gsap.set(items, { opacity: 1, y: 0, scale: 1 }); startFloat(); return; }
  gsap.fromTo(items,
    { opacity: 0, y: 46, scale: .94 },
    {
      opacity: 1, y: 0, scale: 1,
      duration: .62, ease: "power3.out", stagger: 0.055,
      onComplete: startFloat
    }
  );
}

function goIndex() {
  state = "index";
  stopFloat();
  explore.classList.remove("is-open");
  bento.hidden = true;
  bento.innerHTML = "";
}

/* ---------- project overlay (GSAP Flip expand) ---------- */
const oHero    = document.getElementById("overlayHero");
const oEyebrow = document.getElementById("overlayEyebrow");
const oTitle   = document.getElementById("overlayTitle");
const oMeta    = document.getElementById("overlayMeta");
const oDesc    = document.getElementById("overlayDesc");
const oGallery = document.getElementById("overlayGallery");
const oNote    = document.getElementById("overlayNote");

function buildOverlayContent(cat, p) {
  oEyebrow.textContent = cat.label + (p.eyebrow ? " — " + p.eyebrow : "");
  oTitle.textContent = p.title;
  oMeta.textContent = p.meta || "";
  oMeta.style.display = p.meta ? "block" : "none";

  if (p.status === "ready") {
    oDesc.textContent = p.description || "";
    oDesc.style.display = p.description ? "block" : "none";
    oNote.hidden = true;
    oGallery.hidden = false;
    oGallery.innerHTML = "";
    [p.cover].concat(p.gallery || []).forEach(src => {
      const fig = document.createElement("figure");
      fig.innerHTML =
        '<img src="' + img(src, "1200") + '" ' +
          'srcset="' + img(src, "1200") + ' 1200w, ' + img(src, "2000") + ' 2000w" ' +
          'sizes="(max-width: 900px) 100vw, 1100px" ' +
          'alt="' + p.title + '" loading="lazy" decoding="async">';
      oGallery.appendChild(fig);
    });
  } else {
    oDesc.style.display = "none";
    oGallery.hidden = true;
    oGallery.innerHTML = "";
    oNote.hidden = false;
    oNote.textContent = "This project is in preparation. Imagery and writing are being prepared for the studio archive.";
  }
}

function openProject(catKey, id, card) {
  const cat = findCategory(catKey);
  const p = findProject(catKey, id);
  buildOverlayContent(cat, p);

  const visual = card.querySelector(".card-visual");
  activeCard = card;

  // keep the bento cell from collapsing while its visual is lifted out
  card.style.height = card.offsetHeight + "px";

  overlay.classList.add("is-open");
  overlay.setAttribute("aria-hidden", "false");
  overlay.scrollTop = 0;
  document.body.style.overflow = "hidden";

  if (REDUCED || !window.Flip) {
    oHero.appendChild(visual);
    gsap.set(overlay, { opacity: 1 });
    revealOverlayBody(true);
    return;
  }

  const flipState = Flip.getState(visual);
  oHero.appendChild(visual);
  gsap.set(overlay, { opacity: 1 });
  Flip.from(flipState, {
    duration: .62,
    ease: "power3.inOut",
    absolute: true,
    scale: false
  });
  revealOverlayBody(false);
}

function revealOverlayBody(instant) {
  const body = overlay.querySelectorAll(".overlay-body .wrap > *");
  if (instant || REDUCED) { gsap.set(body, { opacity: 1, y: 0 }); return; }
  gsap.fromTo(body,
    { opacity: 0, y: 24 },
    { opacity: 1, y: 0, duration: .5, ease: "power2.out", stagger: .06, delay: .26 }
  );
}

function closeProject() {
  if (!activeCard) return;
  const card = activeCard;
  const visual = oHero.querySelector(".card-visual");

  const finish = () => {
    card.style.height = "";
    overlay.classList.remove("is-open");
    overlay.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    gsap.set(overlay, { opacity: 0 });
    activeCard = null;
  };

  if (REDUCED || !window.Flip || !visual) {
    if (visual) card.insertBefore(visual, card.firstChild);
    finish();
    return;
  }

  const flipState = Flip.getState(visual);
  card.insertBefore(visual, card.firstChild);
  Flip.from(flipState, {
    duration: .5,
    ease: "power3.inOut",
    absolute: true,
    scale: false,
    onComplete: finish
  });
  gsap.to(overlay.querySelectorAll(".overlay-body .wrap > *"), {
    opacity: 0, duration: .2
  });
}

/* ---------- wiring ---------- */
document.getElementById("overlayClose").addEventListener("click", closeProject);
document.getElementById("navIndex").addEventListener("click", () => {
  if (overlay.classList.contains("is-open")) closeProject();
  goIndex();
  document.getElementById("work").scrollIntoView({ behavior: "smooth" });
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && overlay.classList.contains("is-open")) closeProject();
});

renderCatList();
if (!REDUCED) {
  gsap.from(".cat-row", {
    opacity: 0, y: 30, duration: .6, ease: "power3.out", stagger: .07, delay: .1
  });
}
</script>

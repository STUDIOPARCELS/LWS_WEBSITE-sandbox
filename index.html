<style>
:root{
  --paper:#ffffff;
  --ink:#111111;
  --grey-1:#6e6e73;
  --grey-2:#a6a6a6;
  --grey-3:#dcdcda;
  --grey-4:#f3f2f0;
  --box:#fbfbfa;
  --margin:clamp(26px,5vw,64px);
  --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  min-height:100vh;
  background:var(--paper);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
p,h1,h2,h3{margin:0;}
img{display:block;max-width:100%;}

/* ---------- brand + breadcrumb ---------- */
.brand{
  position:fixed; top:34px; left:var(--margin); z-index:60;
  font-size:12px; letter-spacing:.24em; text-transform:uppercase; font-weight:600;
}
.crumbs{
  position:fixed; top:64px; left:var(--margin); z-index:60;
  display:flex; gap:8px; align-items:center;
  font-size:11px; letter-spacing:.12em; text-transform:uppercase; font-weight:600;
  color:var(--grey-2); opacity:0; transition:opacity .4s var(--ease);
}
.crumbs.show{opacity:1;}
.crumbs button{color:var(--grey-1); transition:color .2s ease;}
.crumbs button:hover{color:var(--ink);}
.crumbs .sep{color:var(--grey-3);}
.crumbs .here{color:var(--ink);}

/* ---------- category deck (floating boxes, right) ---------- */
.cat-deck{
  position:fixed; right:var(--margin); top:50%; transform:translateY(-50%);
  z-index:50; display:flex; flex-direction:column; gap:clamp(10px,1.5vh,18px);
}
.cat-box{
  width:clamp(150px,15vw,190px);
  padding:15px 19px;
  border-radius:16px;
  background:var(--paper);
  border:1px solid var(--grey-3);
  text-align:left;
  box-shadow:0 16px 34px -22px rgba(0,0,0,.4);
  transition:box-shadow .35s var(--ease),
             background .3s var(--ease), color .3s var(--ease);
  will-change:transform;
}
.cat-box .cat-name{display:block;font-size:15px;font-weight:600;letter-spacing:-.01em;}
.cat-box .cat-count{
  display:block;margin-top:6px;
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--grey-2);
}
.cat-box:hover{box-shadow:0 24px 44px -20px rgba(0,0,0,.5);}
.cat-box.is-active{background:var(--ink);color:#fff;border-color:var(--ink);}
.cat-box.is-active .cat-count{color:rgba(255,255,255,.55);}

/* ---------- stage + project grid ---------- */
.field{
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:clamp(150px,20vh,220px) clamp(216px,24vw,330px)
          clamp(96px,13vh,150px) clamp(40px,8vw,120px);
}
.grid{
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:clamp(22px,2.4vw,40px);
  max-width:840px;
}
.box{
  position:relative;
  width:clamp(168px,19vw,222px);
  aspect-ratio:1/1;
  border-radius:20px;
  background:var(--box);
  border:1px solid var(--grey-3);
  box-shadow:0 26px 54px -32px rgba(0,0,0,.45);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:22px;
  transition:box-shadow .4s var(--ease);
  will-change:transform;
}
.box:hover{box-shadow:0 34px 60px -28px rgba(0,0,0,.6);}
.box.is-collection{
  box-shadow:9px 9px 0 -1px var(--paper), 9px 9px 0 0 var(--grey-3),
             0 26px 54px -32px rgba(0,0,0,.45);
}
.box.is-collection:hover{
  box-shadow:9px 9px 0 -1px var(--paper), 9px 9px 0 0 var(--grey-3),
             0 34px 60px -30px rgba(0,0,0,.55);
}
.box .b-eyebrow{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  color:var(--grey-2); margin-bottom:9px;
}
.box .b-title{
  font-size:clamp(15px,1.5vw,18px);font-weight:600;letter-spacing:-.01em;line-height:1.2;
}
.box .b-more{
  margin-top:10px;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--grey-1);
}

/* ---------- project detail ---------- */
.detail{
  position:fixed; inset:0; z-index:100;
  background:var(--paper);
  overflow-y:auto;
  opacity:0; visibility:hidden;
}
.detail.is-open{visibility:visible;}
.detail-close{
  position:fixed; top:30px; right:var(--margin); z-index:102;
  font-size:10px; letter-spacing:.2em; text-transform:uppercase; font-weight:600;
  color:var(--grey-1);
  padding:11px 18px; border-radius:999px; border:1px solid var(--grey-3);
  background:rgba(255,255,255,.8); backdrop-filter:blur(8px);
  transition:color .2s ease,border-color .2s ease;
}
.detail-close:hover{color:var(--ink);border-color:var(--grey-2);}
.detail-inner{
  max-width:1180px; margin:0 auto;
  padding:clamp(120px,18vh,200px) var(--margin) clamp(100px,14vh,160px);
}
.d-eyebrow{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--grey-1);
}
.d-title{
  margin-top:18px;
  font-size:clamp(40px,6.4vw,88px);
  font-weight:600; letter-spacing:-.03em; line-height:1.02;
  max-width:14ch;
}
.d-meta{
  margin-top:22px;
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-1);
}
.d-note{
  margin-top:30px; max-width:540px;
  font-family:Georgia,"Times New Roman",serif;
  font-size:18px; line-height:1.6; color:var(--grey-1);
}
.d-grid{
  margin-top:clamp(54px,8vh,96px);
  display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(14px,1.8vw,26px);
}
.d-tile{
  position:relative;
  aspect-ratio:4/3;
  background:var(--grey-4);
  border:1px solid var(--grey-3);
  border-radius:14px;
}
.d-tile.is-video::after{
  content:""; position:absolute; top:50%; left:50%;
  width:0;height:0;
  border-style:solid; border-width:11px 0 11px 18px;
  border-color:transparent transparent transparent var(--grey-1);
  transform:translate(-40%,-50%);
}

/* ---------- responsive ---------- */
@media (max-width:860px){
  .cat-deck{
    top:auto; bottom:0; left:0; right:0; transform:none;
    flex-direction:row; flex-wrap:nowrap; overflow-x:auto;
    gap:10px; padding:12px 14px;
    background:rgba(255,255,255,.94);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border-top:1px solid var(--grey-3);
  }
  .cat-box{width:auto;flex:0 0 auto;padding:11px 15px;}
  .cat-box .cat-count{display:none;}
  .field{padding:120px 22px 150px;}
  .d-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:480px){
  .d-grid{grid-template-columns:1fr;}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
}
</style>
</head>

const SITE = JSON.parse(document.getElementById("site-data").textContent);
const CATS = SITE.categories;
const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const HAS = !!window.gsap;

const deck    = document.getElementById("deck");
const grid    = document.getElementById("grid");
const crumbs  = document.getElementById("crumbs");
const detail  = document.getElementById("detail");

let stack = [];        // [{kind, key, label, items}]
let floats = [];
let busy = false;

const catByKey = k => CATS.find(c => c.key === k);
const deckBox  = k => deck.querySelector('.cat-box[data-cat="' + k + '"]');

function centerOf(el){
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

/* ---------- category deck ---------- */
deck.querySelectorAll(".cat-box").forEach(b => {
  b.addEventListener("click", () => {
    if (busy) return;
    const key = b.dataset.cat;
    if (stack.length && stack[0].key === key) { goHome(); return; }
    openCategory(key);
  });
});
function syncDeck(){
  const active = stack.length ? stack[0].key : null;
  deck.querySelectorAll(".cat-box").forEach(b =>
    b.classList.toggle("is-active", b.dataset.cat === active));
}

/* ---------- breadcrumb ---------- */
function renderCrumbs(){
  crumbs.innerHTML = "";
  if (!stack.length){ crumbs.classList.remove("show"); return; }
  crumbs.classList.add("show");
  const home = document.createElement("button");
  home.type = "button"; home.textContent = "Index";
  home.addEventListener("click", goHome);
  crumbs.appendChild(home);
  stack.forEach((entry, i) => {
    const sep = document.createElement("span");
    sep.className = "sep"; sep.textContent = "/";
    crumbs.appendChild(sep);
    const last = i === stack.length - 1;
    if (last){
      const s = document.createElement("span");
      s.className = "here"; s.textContent = entry.label;
      crumbs.appendChild(s);
    } else {
      const btn = document.createElement("button");
      btn.type = "button"; btn.textContent = entry.label;
      btn.addEventListener("click", () => truncateTo(i));
      crumbs.appendChild(btn);
    }
  });
}

/* ---------- idle float ---------- */
function startFloat(){
  stopFloat();
  if (REDUCED || !HAS) return;
  grid.querySelectorAll(".box").forEach(box => {
    floats.push(gsap.to(box, {
      y: "+=" + gsap.utils.random(4, 9),
      duration: gsap.utils.random(4.2, 6.4),
      ease: "sine.inOut", repeat: -1, yoyo: true,
      delay: gsap.utils.random(0, 1.8)
    }));
  });
}
function stopFloat(){
  floats.forEach(t => t.kill());
  floats = [];
  if (HAS) gsap.set(grid.querySelectorAll(".box"), { y: 0 });
}

/* ---------- build a project box ---------- */
function makeBox(item){
  const box = document.createElement("button");
  box.type = "button";
  const isCollection = !!(item.children && item.children.length);
  box.className = "box" + (isCollection ? " is-collection" : "");
  let inner = "";
  if (item.eyebrow) inner += '<span class="b-eyebrow">' + item.eyebrow + '</span>';
  inner += '<span class="b-title">' + item.title + '</span>';
  if (isCollection) inner += '<span class="b-more">' + item.children.length + ' inside</span>';
  box.innerHTML = inner;
  box.addEventListener("click", () => {
    if (busy) return;
    if (isCollection) openCollection(item, box);
    else if (item.href) window.location.href = item.href;
    else openDetail(item);
  });
  return box;
}

/* ---------- render + fan out ---------- */
function renderGrid(items, origin){
  busy = true;
  stopFloat();
  const build = () => {
    grid.innerHTML = "";
    items.forEach(it => grid.appendChild(makeBox(it)));
    fanOut(Array.prototype.slice.call(grid.children), origin);
  };
  const existing = Array.prototype.slice.call(grid.children);
  if (existing.length && HAS && !REDUCED){
    gsap.to(existing, {
      opacity: 0, scale: .9, duration: .22, stagger: .02, ease: "power2.in",
      onComplete: build
    });
  } else {
    build();
  }
}
function fanOut(boxes, origin){
  if (!boxes.length){ busy = false; return; }
  if (REDUCED || !HAS){
    if (HAS) gsap.set(boxes, { opacity: 1, x: 0, y: 0, scale: 1 });
    busy = false;
    return;
  }
  boxes.forEach(box => {
    const c = centerOf(box);
    gsap.set(box, {
      x: origin.x - c.x, y: origin.y - c.y,
      scale: .32, opacity: 0, transformOrigin: "50% 50%"
    });
  });
  gsap.to(boxes, {
    x: 0, y: 0, scale: 1, opacity: 1,
    duration: .72, ease: "power3.out", stagger: .06,
    onComplete: () => { gsap.set(boxes, { clearProps: "transform" }); busy = false; startFloat(); }
  });
}
function clearGrid(){
  busy = true;
  stopFloat();
  const boxes = Array.prototype.slice.call(grid.children);
  if (!boxes.length || REDUCED || !HAS){ grid.innerHTML = ""; busy = false; return; }
  gsap.to(boxes, {
    opacity: 0, scale: .62, duration: .4, stagger: .03, ease: "power2.in",
    onComplete: () => { grid.innerHTML = ""; busy = false; }
  });
}

/* ---------- navigation ---------- */
function openCategory(key){
  const cat = catByKey(key);
  stack = [{ kind: "category", key: key, label: cat.label, items: cat.projects }];
  syncDeck(); renderCrumbs();
  renderGrid(cat.projects, centerOf(deckBox(key)));
}
function openCollection(item, originEl){
  const origin = centerOf(originEl);
  stack.push({ kind: "collection", key: item.id, label: item.title, items: item.children });
  renderCrumbs();
  renderGrid(item.children, origin);
}
function truncateTo(index){
  if (busy) return;
  stack = stack.slice(0, index + 1);
  syncDeck(); renderCrumbs();
  renderGrid(stack[stack.length - 1].items, centerOf(deckBox(stack[0].key)));
}
function back(){
  if (busy) return;
  if (stack.length <= 1){ goHome(); return; }
  stack.pop();
  renderCrumbs();
  renderGrid(stack[stack.length - 1].items, centerOf(deckBox(stack[0].key)));
}
function goHome(){
  if (busy) return;
  stack = [];
  syncDeck(); renderCrumbs();
  clearGrid();
}

/* ---------- project detail ---------- */
const dEyebrow = document.getElementById("dEyebrow");
const dTitle   = document.getElementById("dTitle");
const dMeta    = document.getElementById("dMeta");
const dNote    = document.getElementById("dNote");
const dGrid    = document.getElementById("dGrid");

function openDetail(item){
  dEyebrow.textContent = item.eyebrow || "";
  dTitle.textContent = item.title;
  dMeta.textContent = item.meta || "";
  dMeta.style.display = item.meta ? "block" : "none";
  dNote.textContent = "In preparation — photographs and writing for this project are being prepared for the studio archive.";
  dGrid.innerHTML = "";
  for (let i = 0; i < 6; i++){
    const tile = document.createElement("div");
    tile.className = "d-tile" + (i === 1 ? " is-video" : "");
    dGrid.appendChild(tile);
  }
  detail.classList.add("is-open");
  detail.setAttribute("aria-hidden", "false");
  detail.scrollTop = 0;
  document.body.style.overflow = "hidden";
  if (HAS && !REDUCED){
    gsap.fromTo(detail, { opacity: 0 }, { opacity: 1, duration: .32, ease: "power2.out" });
    gsap.fromTo(".detail-inner > *",
      { opacity: 0, y: 26 },
      { opacity: 1, y: 0, duration: .6, ease: "power3.out", stagger: .07, delay: .12 });
  } else {
    detail.style.opacity = 1;
  }
}
function closeDetail(){
  const finish = () => {
    detail.classList.remove("is-open");
    detail.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    if (HAS) gsap.set(detail, { opacity: 0 }); else detail.style.opacity = 0;
  };
  if (HAS && !REDUCED) gsap.to(detail, { opacity: 0, duration: .26, ease: "power2.in", onComplete: finish });
  else finish();
}

/* ---------- wiring ---------- */
document.getElementById("detailClose").addEventListener("click", closeDetail);
document.getElementById("brand").addEventListener("click", e => {
  e.preventDefault();
  if (detail.classList.contains("is-open")) closeDetail();
  goHome();
});
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (detail.classList.contains("is-open")) closeDetail();
  else if (stack.length) back();
});

if (!REDUCED && HAS){
  gsap.from(".cat-box", {
    opacity: 0, x: 34, duration: .7, ease: "power3.out", stagger: .08, delay: .15,
    clearProps: "transform,opacity"
  });
  gsap.from(".brand", { opacity: 0, duration: .9, delay: .1, clearProps: "opacity" });
}
</script>
